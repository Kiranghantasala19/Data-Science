<!DOCTYPE html>
<html>
<head>

<title>Flask API Project</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:40px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:10px;
margin:10px;
cursor:pointer;
}

img{
width:200px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>Calculator</h2>

<input id="num1" placeholder="Number 1">
<input id="num2" placeholder="Number 2">

<br>

<select id="operation">
<option value="add">Add</option>
<option value="sub">Subtract</option>
<option value="mul">Multiply</option>
<option value="div">Divide</option>
</select>

<br>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>


<hr>

<button onclick="showImages()">Show Images</button>

<div id="images"></div>

<script>

function calculate(){

let a = document.getElementById("num1").value
let b = document.getElementById("num2").value
let op = document.getElementById("operation").value

fetch(`/calculate?a=${a}&b=${b}&op=${op}`)

.then(res => res.json())

.then(data => {

document.getElementById("result").innerText = "Result: " + data.result

})

}


function showImages(){

fetch("/get")

.then(res => res.json())

.then(data => {

let div = document.getElementById("images")

div.innerHTML=""

data.forEach(img => {

div.innerHTML += `<img src="${img}">`

})

})

}

</script>

</body>
</html>
